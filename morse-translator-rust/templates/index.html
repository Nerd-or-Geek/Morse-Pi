function copyText(text){if(!text)return;navigator.clipboard?.writeText(text).then(()=>toast('Copied!','success',1500)).catch(()=>toast('Copy failed','error',1500));}

// ── Settings helpers ───────────────────────────
function setPinMode(mode){settings.pin_mode=mode;renderContent();}
function setOutputType(type){settings.output_type=type;renderContent();}
function setSpeakerGndMode(mode){settings.speaker_gnd_mode=mode;renderContent();}
function setFarnsworthEnabled(enabled){
  const charEl=document.getElementById('s-wpm_target');
  const farnEl=document.getElementById('s-farnsworth_wpm');
  const charWpm=Math.max(5, parseInt(charEl?.value, 10) || settings.wpm_target || SETTINGS_DEFAULTS.wpm_target);
  settings.wpm_target=charWpm;

  if(enabled){
    if(charWpm<=5){
      settings.farnsworth_wpm=charWpm;
      toast('Increase Character Speed above 5 WPM to enable Farnsworth timing','warning',2600);
    } else {
      const current=Math.max(5, parseInt(farnEl?.value, 10) || settings.farnsworth_wpm || (charWpm-5));
      settings.farnsworth_wpm=Math.max(5, Math.min(charWpm-1, current<charWpm?current:charWpm-1));
    }
  } else {
    settings.farnsworth_wpm=charWpm;
  }
  renderContent();
}
function saveSettings(){
  const keys=['dot_freq','dash_freq','wpm_target','farnsworth_wpm','difficulty','data_pin','dot_pin','dash_pin'];
  const data={pin_mode:settings.pin_mode,output_type:settings.output_type,speaker_gnd_mode:settings.speaker_gnd_mode||'3v3',use_external_switch:settings.use_external_switch||false};
  keys.forEach(k=>{const el=document.getElementById('s-'+k);if(el)data[k]=el.value;});
  data.wpm_target = Math.max(5, parseInt(data.wpm_target, 10) || SETTINGS_DEFAULTS.wpm_target);
  const farnInput = parseInt(data.farnsworth_wpm, 10);
  const wantFarnsworth = Number.isFinite(farnInput) && farnInput < data.wpm_target && data.wpm_target > 5;
  data.farnsworth_wpm = wantFarnsworth
    ? Math.max(5, Math.min(data.wpm_target - 1, farnInput))
    : data.wpm_target;
  data.farnsworth_enabled = data.farnsworth_wpm < data.wpm_target;
  // SP/LED+ pin: from select
  const sp1El=document.getElementById('s-speaker_pin');
  if(sp1El) data.speaker_pin=parseInt(sp1El.value);
  // SP/LED- pin: nullable
  const sp2El=document.getElementById('s-speaker_pin2');
  if(sp2El) data.speaker_pin2=sp2El.value?parseInt(sp2El.value):null;
  // Device name
  const dnEl=document.getElementById('s-device_name');
  data.device_name = (dnEl && dnEl.value.trim()) ? dnEl.value.trim() : (settings.device_name||'Morse Pi');
  // Ground pin: nullable
  const gpEl=document.getElementById('s-ground_pin');
  if(gpEl) data.ground_pin=gpEl.value?parseInt(gpEl.value):null;
  // Volume slider is 0-100, convert to 0.0-1.0
  const volEl=document.getElementById('s-volume');
  if(volEl) data.volume=parseFloat(volEl.value)/100;
  api('/save_settings','POST',data).then(s=>{
    settings=Object.assign({},SETTINGS_DEFAULTS,s);
    settings.wpm_target = Math.max(5, parseInt(settings.wpm_target, 10) || SETTINGS_DEFAULTS.wpm_target);
    settings.farnsworth_wpm = Math.min(
      settings.wpm_target,
      Math.max(5, parseInt(settings.farnsworth_wpm, 10) || settings.wpm_target)
    );
    toast('Settings saved','success');
    const msg=document.getElementById('settings-msg');
    if(msg){msg.textContent='SAVED';setTimeout(()=>{if(msg)msg.textContent='';},2500);}
    // Update device name in header
    const nameEl = document.getElementById('device-name-display');
    if(nameEl) nameEl.textContent = settings.device_name || 'Morse Pi';
  });
}
function previewTone(freq,duration){
  const f=freq??settings.dot_freq; const d=duration??0.15;
  api('/preview_tone','POST',{freq:+f,duration:+d,duty:+settings.volume});
}
function wpmTest(){
  api('/wpm_test','POST').then(res=>{
    const charWpm = res.character_wpm || settings.wpm_target;
    const farnWpm = res.farnsworth_wpm || settings.farnsworth_wpm || charWpm;
    const msg = charWpm===farnWpm
      ? 'Playing PARIS at '+charWpm+' WPM'
      : 'Playing PARIS at '+charWpm+' char / '+farnWpm+' Farnsworth WPM';
    toast(msg,'info',3500);
  });
}

// ── Keyboard ───────────────────────────────────
let spaceDown=false,zDown=false,xDown=false;
let _dotReleaseTimer=null,_dashReleaseTimer=null;
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  // Network live transmit mode shortcuts
  if(state.mode==='network' && state.net_live_transmit_enabled){
    if(e.code==='Space'&&!spaceDown){spaceDown=true;e.preventDefault();netLiveKeyDown('single');}
    if(settings.pin_mode==='dual'){
      if(e.code==='KeyZ'&&!zDown){zDown=true;e.preventDefault();netLiveKeyDown('dot');}
      if(e.code==='KeyX'&&!xDown){xDown=true;e.preventDefault();netLiveKeyDown('dash');}
    }
    return;
  }
  if(e.code==='Space'&&!spaceDown&&(state.mode==='send'||state.mode==='speed')){
    spaceDown=true;e.preventDefault();api('/key_press','POST',{pressed:true}).catch(()=>{});
  }
  if(e.code==='KeyZ'&&!zDown&&settings.pin_mode==='dual'&&(state.mode==='send'||state.mode==='speed')){
    zDown=true;e.preventDefault();
    if(_dotReleaseTimer){clearTimeout(_dotReleaseTimer);_dotReleaseTimer=null;}
    api('/key_press_dual','POST',{sym:'dot',pressed:true}).catch(()=>{});
    document.getElementById('onscreen-key-dot')?.classList.add('pressed');
  }
  if(e.code==='KeyX'&&!xDown&&settings.pin_mode==='dual'&&(state.mode==='send'||state.mode==='speed')){
    xDown=true;e.preventDefault();
    if(_dashReleaseTimer){clearTimeout(_dashReleaseTimer);_dashReleaseTimer=null;}
    api('/key_press_dual','POST',{sym:'dash',pressed:true}).catch(()=>{});
    document.getElementById('onscreen-key-dash')?.classList.add('pressed');
  }
});
document.addEventListener('keyup',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  // Network live transmit mode shortcuts
  if(state.mode==='network' && state.net_live_transmit_enabled){
    if(e.code==='Space'&&spaceDown){spaceDown=false;e.preventDefault();netLiveKeyUp('single');}
    if(settings.pin_mode==='dual'){
      if(e.code==='KeyZ'&&zDown){zDown=false;e.preventDefault();netLiveKeyUp('dot');}
      if(e.code==='KeyX'&&xDown){xDown=false;e.preventDefault();netLiveKeyUp('dash');}
    }
    return;
  }
  if(e.code==='Space'&&spaceDown){spaceDown=false;e.preventDefault();api('/key_press','POST',{pressed:false}).catch(()=>{});}
  if(e.code==='KeyZ'&&zDown){
    zDown=false;e.preventDefault();
    document.getElementById('onscreen-key-dot')?.classList.remove('pressed');
    // Delay release 50 ms so keydown always arrives at server first (fixes ghost-press race)
    _dotReleaseTimer=setTimeout(()=>{api('/key_press_dual','POST',{sym:'dot',pressed:false}).catch(()=>{});_dotReleaseTimer=null;},50);
  }
  if(e.code==='KeyX'&&xDown){
    xDown=false;e.preventDefault();
    document.getElementById('onscreen-key-dash')?.classList.remove('pressed');
    _dashReleaseTimer=setTimeout(()=>{api('/key_press_dual','POST',{sym:'dash',pressed:false}).catch(()=>{});_dashReleaseTimer=null;},50);
  }
});

// ── Polling — incremental DOM updates ──────────
let _pBtn=null,_pSBuf=null,_pSOut=null,_pSpBuf=null,_pSpOut=null,_pNetBuf=null,_pNetOut=null;
let _pollInFlight=false;
setInterval(()=>{
  if(_pollInFlight)return; // skip if previous poll still in progress
  _pollInFlight=true;
  fetch('/status',{signal:AbortSignal.timeout(3000)}).then(r=>{connOk();return r.json();}).then(s=>{
    const bd=document.getElementById('btn-dot');
    if(bd)bd.className=s.button_active?'dot active':'dot';
    updateGpioPinStates(s.pin_states);

    // Incremental update for Send mode — patch only the changed DOM elements
    if(state.mode==='send'){
      const bufChanged  = s.current_morse_buffer !== _pSBuf;
      const outChanged  = s.send_output !== _pSOut;
      const btnChanged  = s.button_active !== _pBtn;
      if(bufChanged || outChanged || btnChanged){
        // Update state data
        state.button_active = s.button_active;
        state.current_morse_buffer = s.current_morse_buffer;
        state.send_output = s.send_output;
        // Patch DOM directly
        _patchSendDisplay();
      }
    }
    // Incremental update for Speed mode
    else if(state.mode==='speed' && !showSpeedResult){
      const bufChanged  = s.speed_morse_buffer !== _pSpBuf;
      const outChanged  = s.speed_morse_output !== _pSpOut;
      const btnChanged  = s.button_active !== _pBtn;
      if(bufChanged || outChanged || btnChanged){
        state.button_active = s.button_active;
        state.speed_morse_buffer = s.speed_morse_buffer;
        state.speed_morse_output = s.speed_morse_output;
        _patchSpeedDisplay();
      }
    }
    // Incremental update for Network key mode
    else if(state.mode==='network' && state.net_key_mode){
      const bufChanged = s.net_morse_buffer !== _pNetBuf;
      const outChanged = s.net_morse_output !== _pNetOut;
      const btnChanged = s.button_active !== _pBtn;
      if(bufChanged || outChanged || btnChanged){
        state.button_active = s.button_active;
        state.net_morse_buffer = s.net_morse_buffer;
        state.net_morse_output = s.net_morse_output;
        _patchNetKeyDisplay();
      }
      _pNetBuf = s.net_morse_buffer; _pNetOut = s.net_morse_output;
    }
    // Incremental update for Network LIVE transmit mode
    else if(state.mode==='network' && state.net_live_transmit_enabled){
      if(s.button_active !== _pBtn){
        state.button_active = s.button_active;
        const ld = document.getElementById('net-live-display');
        if(ld){
          ld.className = 'morse-display'+(s.button_active?' active-send':'');
          ld.innerHTML = s.button_active
            ? '<span style="color:var(--accent3);">\u25cf &nbsp;TRANSMITTING&hellip;</span>'
            : '<span style="color:var(--text-dim);font-size:0.85rem;">hold key or paddle to transmit\u2026</span>';
        }
      }
    }
    // Update keyboard output if on keyboard tab and output changed
    else if(state.mode==='keyboard'){
      const newKbOutput = s.kb_output || '';
      if(newKbOutput !== kbOutput){
        kbOutput = newKbOutput;
        _patchKbDisplay();
      }
      // Also update HID availability
      usbHidAvailable = s.usb_hid_available;
      kbEnabled = s.kb_enabled;
    }
    _pBtn=s.button_active;_pSBuf=s.current_morse_buffer;_pSOut=s.send_output;_pSpBuf=s.speed_morse_buffer;_pSpOut=s.speed_morse_output;
    _pollInFlight=false;
  }).catch(()=>{connLost();_pollInFlight=false;});
},250);

// ── Incremental DOM patchers ───────────────────
function _patchKbDisplay(){
  // Update keyboard output display in letter or custom mode
  const outEl = document.querySelector('.morse-display');
  if(outEl && state.mode==='keyboard'){
    if(kbMode==='letters'){
      outEl.innerHTML = kbOutput 
        ? '<div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:1.2rem;letter-spacing:0.15em;color:var(--accent);">' + esc(kbOutput) + '</div>'
        : '<div style="flex:1;display:flex;align-items:center;justify-content:center;"><span style="color:var(--text-dim);font-size:0.8rem;">Key Morse code to type letters here...</span></div>';
    } else {
      outEl.innerHTML = '<span style="color:var(--text-dim);font-size:0.8rem;">Custom keys sent: ' + (kbOutput ? esc(kbOutput) : 'none yet') + '</span>';
    }
  }
}

function _patchSendDisplay(){
  const buf = state.current_morse_buffer||'';
  const out = state.send_output||'';
  const isActive = state.button_active;
  const bufEl = document.getElementById('send-buf-display');
  const outEl = document.getElementById('send-out-display');
  if(bufEl){
    bufEl.className = 'morse-display'+(isActive?' active-send':'');
    bufEl.innerHTML = buf ? esc(buf)+(isActive?'<span class="cursor"></span>':'')
      : '<span style="color:var(--text-dim);font-size:0.92rem;">awaiting input\u2026</span>';
  }
  if(outEl){
    outEl.innerHTML = out ? esc(out)
      : '<span style="color:var(--text-dim);font-size:0.88rem;">start sending\u2026</span>';
  }
}
function _patchSpeedDisplay(){
  const buf = state.speed_morse_buffer||'';
  const out = state.speed_morse_output||'';
  const isActive = state.button_active;
  const bufEl = document.getElementById('speed-buf-display');
  const outEl = document.getElementById('speed-out-display');
  if(bufEl){
    bufEl.className = 'morse-display'+(isActive?' active-send':'');
    bufEl.innerHTML = buf ? esc(buf)+(isActive?'<span class="cursor"></span>':'')
      : '<span style="color:var(--text-dim);font-size:0.88rem;">awaiting\u2026</span>';
  }
  if(outEl){
    outEl.innerHTML = out ? esc(out)
      : '<span style="color:var(--text-dim);font-size:0.83rem;">start sending\u2026</span>';
  }
}
function _patchNetKeyDisplay(){
  const buf = state.net_morse_buffer||'';
  const out = state.net_morse_output||'';
  const isActive = state.button_active;
  const bufEl = document.getElementById('net-key-buf');
  const outEl = document.getElementById('net-key-out');
  if(bufEl){
    bufEl.className = 'morse-display'+(isActive?' active-send':'');
    bufEl.innerHTML = buf ? esc(buf)+(isActive?'<span class="cursor"></span>':'')
      : '<span style="color:var(--text-dim);font-size:0.85rem;">awaiting input\u2026</span>';
  }
  if(outEl){
    outEl.innerHTML = out ? esc(out)
      : '<span style="color:var(--text-dim);font-size:0.8rem;">start keying\u2026</span>';
  }
}

// ── Theme Toggle ────────────────────────────
function toggleTheme() {
  const root = document.documentElement;
  const btn = document.getElementById('theme-btn');
  if (root.classList.contains('light')) {
    root.classList.remove('light');
    if(btn) btn.innerHTML = '&#9788; LIGHT';
    localStorage.setItem('morse-pi-theme', 'dark');
  } else {
    root.classList.add('light');
    if(btn) btn.innerHTML = '&#9790; DARK';
    localStorage.setItem('morse-pi-theme', 'light');
  }
}

// Apply saved theme on load
(function() {
  const saved = localStorage.getItem('morse-pi-theme');
  const btn = document.getElementById('theme-btn');
  if (saved === 'light') {
    document.documentElement.classList.add('light');
    if (btn) btn.innerHTML = '&#9790; DARK';
  }
})();
</script>
